<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>송금이 도착했습니다</title>

    <!-- 카카오톡 미리보기용 Open Graph 태그 -->
    <meta property="og:title" content=" ">
    <meta property="og:description" content=" ">
    <meta property="og:image" content="https://dgsung.github.io/kakaoprank/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dgsung.github.io/kakaoprank/">

    <!-- 트위터 카드 -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="최지웅바보!">
    <meta name="twitter:description" content="₩100,000 송금이 도착했습니다">
    <meta name="twitter:image" content="https://dgsung.github.io/kakaoprank/og-image.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
            background: #FEE500;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 60px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .logo { color: #3C1E1E; font-size: 20px; margin-bottom: 20px; }
        .divider { border: none; border-top: 1px solid #E0E0E0; margin: 15px 0; }
        .message { font-size: 36px; font-weight: bold; color: #191919; margin: 20px 0; }
        .amount { font-size: 28px; color: #3C1E1E; margin: 15px 0; }
        .notice { font-size: 16px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">kakaopay</div>
        <hr class="divider">
        <div class="message">최지웅바보!</div>
        <div class="amount">&#8361; 100,000</div>
        <div class="notice">송금이 도착했습니다</div>
    </div>
</body>
</html>
